name: "Vokuro CI"

on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
  workflow_dispatch:

env:
  # Phalcon v5 C extension constraint (installed from source via PIE)
  PHALCON_CONSTRAINT: "^5.0"
  EXTENSIONS: "mbstring, intl, json, openssl, pdo_mysql"

permissions: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  quality:
    name: "Code quality"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: "Setup PHP"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: ${{ env.EXTENSIONS }}
          tools: composer:v2

      # The quality tools do not need the Phalcon extension: phpstan analyses the
      # phalcon/phalcon (v6) source pulled in by Composer.
      - name: "Validate composer"
        run: composer validate --no-check-all --no-check-publish

      - name: "Install dependencies"
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4
        with:
          composer-options: "--prefer-dist"

      - name: "PHPCS"
        run: composer cs

      - name: "PHPStan"
        run: composer analyze

      - name: "PHP CS Fixer (dry-run)"
        run: composer cs-fixer

  tests:
    name: "Tests (PHP ${{ matrix.php }})"
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs:
      - quality
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    services:
      mysql:
        image: mysql:8.0
        ports:
          - "3306:3306"
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: vokuro
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1

      - name: "Setup PHP"
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ env.EXTENSIONS }}
          tools: composer:v2

      # pecl's phalcon release metadata caps at PHP 8.4; PIE builds it from source.
      - name: "Install Phalcon (v5) via PIE"
        run: |
          curl -fsSL https://github.com/php/pie/releases/latest/download/pie.phar -o pie.phar
          sudo "$(which php)" pie.phar install --no-interaction "phalcon/cphalcon:${{ env.PHALCON_CONSTRAINT }}"
          php -m | grep -i phalcon

      - name: "Install dependencies"
        uses: ramsey/composer-install@26d8a556604053a9612623447203a691f406fbe6 # v4
        with:
          composer-options: "--prefer-dist"

      - name: "Prepare environment"
        run: |
          cp .env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          mkdir -p var/cache/acl var/cache/metaData var/cache/session var/cache/volt var/logs

      - name: "Migrate and seed"
        run: |
          composer migrate
          composer seed

      - name: "Start web server"
        run: php -S 127.0.0.1:8888 -t public .htrouter.php &>/dev/null &

      - name: "Unit and functional tests"
        run: |
          composer test-unit
          composer test-functional

      - name: "Acceptance tests"
        run: composer test-acceptance
